version: '3.9'

services:
  frontend:
    container_name: ontrack-frontend
    hostname: ontrack-frontend
    image: ghcr.io/robinkiefer2001/ontrack-frontend:latest
    networks:
      - web
    labels:
      - "traefik.enable=true"

      # Haupt-Router — mit Authentik Middleware
      - "traefik.http.routers.frontend.rule=Host(`ontrack.informait.ch`)"
      - "traefik.http.routers.frontend.entrypoints=websecure"
      - "traefik.http.routers.frontend.tls.certresolver=le"
      - "traefik.http.routers.frontend.middlewares=authentik@docker"
      - "traefik.http.routers.frontend.priority=10"
      - "traefik.http.services.frontend.loadbalancer.server.port=3000"

      # Outpost-Router — OHNE Middleware, damit Login-Callback funktioniert
      - "traefik.http.routers.frontend-outpost.rule=Host(`ontrack.informait.ch`) && PathPrefix(`/outpost.goauthentik.io/`)"
      - "traefik.http.routers.frontend-outpost.entrypoints=websecure"
      - "traefik.http.routers.frontend-outpost.tls.certresolver=le"
      - "traefik.http.routers.frontend-outpost.service=authentik-outpost-svc"
      - "traefik.http.routers.frontend-outpost.priority=15"
      - "traefik.http.services.authentik-outpost-svc.loadbalancer.server.url=http://ontrack-authentik:9000"

      # Middleware Definition
      - "traefik.http.middlewares.authentik.forwardauth.address=http://ontrack-authentik:9000/outpost.goauthentik.io/auth/traefik"
      - "traefik.http.middlewares.authentik.forwardauth.trustForwardHeader=true"
      - "traefik.http.middlewares.authentik.forwardauth.authResponseHeaders=X-authentik-username,X-authentik-groups,X-authentik-entitlements,X-authentik-email,X-authentik-name,X-authentik-uid,X-authentik-jwt,X-authentik-meta-jwks,X-authentik-meta-outpost,X-authentik-meta-provider,X-authentik-meta-app,X-authentik-meta-version"

networks:
  web:
    external: false