name: frontend-build-images

permissions:
  contents: read
  packages: write

on:
  push:
    branches: [main]

jobs:
  build-images:
   runs-on: ubuntu-latest
   steps:
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
      with:
       version: latest

    - name: Log in to GitHub Container Registry
      run: echo "${{ secrets.PROD_FRONTEND_GHCR_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

    - uses: actions/checkout@v4
    - name: Build Images
      run: |
         docker compose -f frontend-docker-compose-build.yml build

    - name: Push Images
      run: |
        docker push ghcr.io/${{ github.repository_owner }}/ontrack-frontend --all-tags